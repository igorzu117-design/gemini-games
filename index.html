<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Games Community</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <header>
        <div class="container">
            <div class="header-main">
                <div class="logo-central">
                    <img src="assets/logo.png" alt="Gemini Logo" class="brand-logo">
                    <div class="logo">Gemini <span>Games Community</span></div>
                </div>
                <nav>
                    <ul class="nav-links">
                        <li><a href="#">Регистрация</a></li>
                        <li><a href="#">Отзывы</a></li>
                        <li><a href="#">Аккаунт</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="main-grid">
            <section class="content">
                <div class="search-container">
                    <div class="search-box">
                        <span>🔍</span>
                        <input type="text" placeholder="Поиск">
                    </div>
                </div>

                <!-- Reactions removed as requested -->

                <div class="bottom-sections">
                    <div class="cool-games">
                        <h2 class="section-title">Крутые игры</h2>
                        <div class="list-item">Titan Battle</div>
                        <div class="list-item">Space Odyssey</div>
                        <div class="list-item">Cyber Arena</div>
                    </div>
                    <div class="popular-projects">
                        <h2 class="section-title">Популярные проекты</h2>
                        <div class="list-item">Gemini Engine</div>
                        <div class="list-item">Community Hub</div>
                        <div class="list-item">Game Dev AI</div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <footer>
        <div class="container">
            <div class="logo footer-logo" style="justify-content: center;">Gemini <span>Games Community</span></div>
            <p>ВсЕ ПрАвА пОчТи зАщИщЕнЫ :)</p>
        </div>
    </footer>
</body>

</html>
